<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-blog"></i>
                <h1>我的博客</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="active"><i class="fas fa-home"></i> 首页</a>
                <a href="#"><i class="fas fa-user"></i> 关于</a>
                <a href="#"><i class="fas fa-rss"></i> 订阅</a>
            </nav>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- 主要内容 -->
        <main class="main">
            <!-- 欢迎部分 -->
            <section class="hero">
                <h2>欢迎来到我的个人空间</h2>
                <p>这里记录我的思考、学习和生活点滴。专注于技术、心理学和个人成长。</p>
                <div class="stats">
                    <div class="stat">
                        <i class="fas fa-pen-fancy"></i>
                        <span>已发布 <strong id="articleCount">3</strong> 篇文章</span>
                    </div>
                    <div class="stat">
                        <i class="fas fa-calendar-alt"></i>
                        <span>最近更新: <strong>2024年3月</strong></span>
                    </div>
                </div>
            </section>

            <!-- 文章列表 -->
            <section class="articles">
                <h3><i class="fas fa-newspaper"></i> 最新文章</h3>
                <div class="article-grid" id="articleGrid">
                    <!-- 文章卡片将通过JavaScript动态加载 -->
                </div>
            </section>

            <!-- 侧边栏 -->
            <aside class="sidebar">
                <div class="widget">
                    <h4><i class="fas fa-user-circle"></i> 关于我</h4>
                    <p>一名热爱技术与写作的开发者，喜欢分享知识和经验。</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-github"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-linkedin"></i></a>
                        <a href="#"><i class="fas fa-envelope"></i></a>
                    </div>
                </div>
                <div class="widget">
                    <h4><i class="fas fa-tags"></i> 热门标签</h4>
                    <div class="tags">
                        <span class="tag">技术</span>
                        <span class="tag">心理学</span>
                        <span class="tag">个人成长</span>
                        <span class="tag">编程</span>
                        <span class="tag">生活</span>
                    </div>
                </div>
                <div class="widget">
                    <h4><i class="fas fa-calendar-check"></i> 近期计划</h4>
                    <ul class="plans">
                        <li>学习React框架</li>
                        <li>写一篇关于AI的文章</li>
                        <li>整理读书笔记</li>
                    </ul>
                </div>
            </aside>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2024 我的个人博客 | 使用纯静态网站构建</p>
            <p class="footer-links">
                <a href="#">隐私政策</a> |
                <a href="#">使用条款</a> |
                <a href="mailto:contact@example.com">联系我</a>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
